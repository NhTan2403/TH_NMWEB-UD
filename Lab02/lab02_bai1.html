<!DOCTYPE html

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>BookStore</title>
</head>

<body>
    <table width="1000" align="center" border="1" cellpadding="0" cellspacing="0">

        <tr>
            <td>
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                    <tr>
                        <td height="173" width="300" align="center" valign="middle" bgcolor="#FFCCCC">

                        </td>
                        <td width="700" align="center" bgcolor="#ADD8E6">
                            Banner
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr>
            <td height="70">
                <table width="100%" border="1" cellpadding="0" cellspacing="0" height="70">
                    <tr>
                        <td align="center">1</td>
                        <td align="center">2</td>
                        <td align="center">3</td>
                        <td align="center">4</td>
                        <td align="center">5</td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td height="10"></td>
        </tr>
        <tr>
            <td>
                <table width="100%" border="0" cellpadding="0" cellspacing="0">
                    <tr>
                        <td width="196" height="250" valign="top">
                            <table width="100%" border="1" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">1</td>
                                </tr>
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">2</td>
                                </tr>
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">3</td>
                                </tr>
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">4</td>
                                </tr>
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">5</td>
                                </tr>
                            </table>
                        </td>

                        <td width="24" style="border:3px solid #b2b2cc;" height="70" align="center"></td>
                        <td width="560" align="center">
                            Content
                        </td>

                        <td width="24" style="border:3px solid #b2b2cc;" height="70" align="center"></td>
                        <td width="196" valign="top">
                            <table width="100%" border="1" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">1</td>
                                </tr>
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">2</td>
                                </tr>
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">3</td>
                                </tr>
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">4</td>
                                </tr>
                                <tr>
                                    <td height="50" align="center" bgcolor="#CCFFCC">5</td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>

        <tr>
            <td height="10"></td>
        </tr>

        <tr>
            <td height="60" align="center" style="border:3px solid #b2b2cc;"> Footer </td>
        </tr>

    </table>
