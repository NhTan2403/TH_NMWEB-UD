<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">Laptopshop</div>
        <div class="menu">
            <a href="index.html">Quay về Trang Chủ</a>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-box">
            <h2 style="margin-bottom: 30px;">ĐĂNG NHẬP</h2>
            <form action="index.html">
                <div style="text-align: left;">
                    <label>Email</label>
                    <input type="email" placeholder="Nhập email..." required>
                </div>
                <div style="text-align: left;">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu..." required>
                </div>
                <div style="text-align: left; margin-top: 10px;">
                    <a href="#" style="color: #4a90e2; font-size: 14px;">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-dark">Đăng nhập</button>

                <p style="margin-top: 20px; font-size: 14px;">
                    Chưa có tài khoản? <a href="#" style="color: #4a90e2;">Đăng ký</a>
                </p>
            </form>
        </div>
    </div>
</body>

</html>
