<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng - LaptopShop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">Laptopshop</div>
        <div class="menu">
            <a href="index.html">Trang Chủ</a>
            <a href="products.html">Sản Phẩm</a>
        </div>
        <div class="auth">
            <a href="cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a>
        </div>
    </nav>

    <section class="section-container">
        <h2 class="section-title">Giỏ hàng của bạn</h2>
        <div id="cart-items-list"></div>
        <div id="cart-summary" style="margin-top: 20px; text-align: right; border-top: 2px solid #eee; padding-top: 20px;">
            <h3>Tổng cộng: <span id="total-price" style="color: #82c91e;">0 đ</span></h3>
            <button class="btn-pay-now" onclick="showQR()" style="background: #ffb703; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Thanh Toán Ngay</button>
        </div>

        <div id="qrModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000;">
            <div class="modal-content" style="background: white; padding: 25px; border-radius: 20px; text-align: center; position: relative; max-width: 400px; width: 90%;">
                <span class="close" onclick="closeQR()" style="position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; color: #666;">&times;</span>
                <h2 style="color: #333; margin-bottom: 20px; font-weight: bold;">QUÉT MÃ ĐỂ THANH TOÁN</h2>
                <img src="images/MAQR.jpg" alt="QR Code" style="width: 100%; border-radius: 10px; border: 1px solid #eee;">
                <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc;">
                    <p style="font-weight: bold; color: #333;">Chủ TK: TRẦN NHẬT TÂN</p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        // Hàm hiện và đóng QR Modal
        function showQR() {
            document.getElementById('qrModal').style.display = 'flex';
        }

        function closeQR() {
            document.getElementById('qrModal').style.display = 'none';
        }

        function renderCart() {
            const container = document.getElementById('cart-items-list');
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = "<p>Giỏ hàng đang trống!</p>";
                document.getElementById('total-price').innerText = "0 đ";
                return;
            }

            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div style="display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eee;">
                        <img src="${item.img}" width="80">
                        <div style="flex: 1; margin-left: 20px;">
                            <h4>${item.name}</h4>
                            <p style="color: #82c91e; font-weight: bold;">${new Intl.NumberFormat('vi-VN').format(item.price)} đ</p>
                        </div>
                        <button onclick="removeFromCart(${index})" style="background: #ff4d4f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Xóa</button>
                    </div>
                `;
            }).join('');

            document.getElementById('total-price').innerText = new Intl.NumberFormat('vi-VN').format(total) + " đ";
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            if (typeof updateCartCount === 'function') updateCartCount();
        }

        renderCart();
    </script>
</body>
</html>
